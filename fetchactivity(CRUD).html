<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {font-family: Arial;}
    </style>
</head>
<body>

    <h3> User Management Operations</h3>

    <button onclick="fetchUser()">Fetch Users</button>
    <button onclick="addUser()">Add Users</button>
    <button onclick="updateUser()">Update Users</button>
    <button onclick="deleteUser()">Delete Users</button>
    <ul id="users"></ul>

<script>

    const apiurl = "https://jsonplaceholder.typicode.com/users";
    const ul = document.getElementById("users");

    function fetchUser(){
        fetch(apiurl)
        .then(res=> res.json())
        .then(users => {
            users.forEach(user => {
                const li =  document.createElement("li");
                li.textContent = `User Name : ${user.username} - EMail : ${user.email}`;
                ul.append(li); 
            });
        })
        .catch(err=> console.error(err))
    }

    function addUser(){

        const newUser = {
            name: "Niti",
            email:"abc@gmail.com"
        }

        fetch(apiurl,{
            method:"POST",
            headers:{"Content-Type": "application/json"},
            body:JSON.stringify(newUser)
        })
        .then(res=>res.json())
        .then(data=>{
            alert("User data is added");
            fetchUser();
        })
    }

    function updateUser(){
         const id = prompt("Enter the id to update the records") ;

         fetch(`${apiurl}/${id}`,{
                method:"PUT",
                headers:{"Content-Type": "application/json"},
                body:JSON.stringify({name:"updated username", email:"xyz@gmail.com"})
        })
        .then(res=>res.json())
        .then(data=>{
            alert("User updated");
            fetchUser();
        })
    }

    function deleteUser(){
         const id = prompt("Enter the id to delete the record") ;

         fetch(`${apiurl}/${id}`,{
                method:"DELETE",
        })
        .then(()=>{
            alert("User deleted");
            fetchUser();
        })
    }

</script>
</body>
</html>
