<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
 // async/await is a syntactic sugar built on top of promises, which allows us to write asynchronous code in a more synchronous and readable manner.
        // It provides a way to handle asynchronous operations without the need for chaining .then() and .catch() methods, making the code easier to understand and maintain.
        // async function - it is a function that is declared with the async keyword, which allows us to use the await keyword inside it to pause the execution of the function until a promise is resolved or rejected.
        // await keyword - it is used to wait for a promise to resolve or reject before proceeding with the execution of the code. It can only be used inside an async function.
      
        async function fetchUserAsync()       
        {
            console.log("Fetching all users data")
          const response =  await fetch("https://jsonplaceholder.typicode.com/users")
           const data =  await response.json()
            console.log("users data" , data);
        }
        fetchUserAsync()
        console.log("Meanwhile , the rest of the app execution will be running")
    </script>
</body>
</html>
