<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
<!-- //short cut key to disable the agent -->
    <script>
         // to retrieve the json data from this api//
         // intentionally we are delaying the fetching of data by 5 seconds to 
         // show the asynchronous nature of js and how it can perform other tasks while 
         // waiting for the data to be fetched from the api.
     setTimeout(() => {   const fetchData = fetch('https://jsonplaceholder.typicode.com/users')
        .then(respone =>respone.json())
     
    fetchData
    .then(data => {console.log("Data received from API : ")
    document.write("<h2> Data received from API : </h2>");
       data.forEach(user => {
    document.write(`<p>User Name : ${user.username} - EMail : ${user.email}</p>`);
   });
    })
    .catch(err => console.error("Error while fetching data : ", err));
},5000);


        // asynchronously the other tasks will run immediately without waiting for the data to be fetched from the api, which is a key feature of JavaScript's non-blocking behavior.
        console.log("fetching data .... is taking some time meanwhile this code is running");
        for(let i= 0; i <=3 ; i++)
    {
        console.log("Performing some other task while fetching data" , i);
    }
    </script>
</body>
</html>
