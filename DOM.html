<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h4 id="changeText">Welcome Back!!!</h4>
    <button id="btn">Click Here to change Text </button>
    <script>
        let button=document.getElementById("btn");
        button.addEventListener("click",function(){
            let content=document.getElementById("changeText");
            content.innerHTML="Text Changed"
        })
    </script>
</body>
</html>
